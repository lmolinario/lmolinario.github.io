<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>OSINT Threat Radar – Dashboard</title>
  <meta name="description" content="Interactive OSINT monitoring dashboard with geospatial visualization of events and aircraft data." />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://lmolinario.github.io/osint-threat-radar/radar/" />

  <meta property="og:title" content="OSINT Threat Radar – Dashboard" />
  <meta property="og:description" content="Interactive OSINT monitoring dashboard with geospatial visualization of events and aircraft data." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://lmolinario.github.io/osint-threat-radar/radar/" />

  <link rel="icon" type="image/png" href="../../favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel2: #1f2937;
      --border: #374151;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #38bdf8;
      --danger: #f87171;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 600;
    }

    header nav a {
      color: var(--muted);
      margin-left: 14px;
      text-decoration: none;
      font-size: 14px;
    }

    header nav a:hover {
      color: var(--accent);
    }

    #layout {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    #map {
      flex: 1;
      height: 100%;
      min-height: 400px;
    }

    #sidebar {
      width: 340px;
      max-width: 100%;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    #controls {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--panel2);
    }

    #controls input,
    #controls select {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
      background: #020617;
      color: var(--text);
      border-radius: 6px;
    }

    .controls-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 6px;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--text);
    }

    .controls-row input[type="checkbox"] {
      width: auto;
      margin: 0;
    }

    button {
      padding: 8px 10px;
      background: var(--accent);
      border: none;
      color: #020617;
      font-weight: 600;
      cursor: pointer;
      border-radius: 6px;
      width: 100%;
      margin-top: 4px;
    }

    button:hover {
      opacity: 0.92;
    }

    #events {
      flex: 1;
      overflow: auto;
      padding: 12px;
      min-height: 0;
    }

    .event {
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
      font-size: 13px;
      cursor: default;
    }

    .event.clickable {
      cursor: pointer;
    }

    .event.clickable:hover {
      background: rgba(255,255,255,0.03);
    }

    .event strong {
      color: #fff;
      display: block;
      margin-bottom: 4px;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .error {
      color: var(--danger);
    }

    #status {
      padding: 8px 10px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      background: #020617;
    }

    @media (max-width: 900px) {
      #layout {
        flex-direction: column;
      }

      #sidebar {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 45vh;
      }

      #map {
        height: 55vh;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>OSINT Threat Radar</h1>
  <nav>
    <a href="/">Home</a>
    <a href="/osint-threat-radar/">Project</a>
    <a href="/projects/">Projects</a>
  </nav>
</header>

<div id="layout">
  <div id="map"></div>

  <div id="sidebar">
    <div id="controls">
      <input id="q" placeholder="Search text" />

      <select id="type">
        <option value="">All types</option>
        <option value="cyber">Cyber</option>
        <option value="incident">Incident</option>
        <option value="intel">Intel</option>
        <option value="news">News</option>
      </select>

      <select id="source">
        <option value="">All sources</option>
        <option value="rss">RSS</option>
        <option value="manual">Manual</option>
      </select>

      <button id="refresh">Refresh</button>

      <label class="controls-row">
        <input type="checkbox" id="aircraftToggle" />
        <span>Show aircraft</span>
      </label>
    </div>

    <div id="events"></div>
    <div id="status">ready</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const API_BASE = "https://osint-threat-radar.onrender.com";

  const map = L.map("map").setView([41.9, 12.5], 5);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 18,
    attribution: "© OpenStreetMap"
  }).addTo(map);

  const eventsLayer = L.layerGroup().addTo(map);
  const aircraftLayer = L.layerGroup().addTo(map);

  const statusEl = document.getElementById("status");
  const eventsEl = document.getElementById("events");
  const qEl = document.getElementById("q");
  const typeEl = document.getElementById("type");
  const sourceEl = document.getElementById("source");
  const refreshBtn = document.getElementById("refresh");
  const aircraftToggle = document.getElementById("aircraftToggle");

  function setStatus(text, isError = false) {
    statusEl.textContent = text;
    statusEl.className = isError ? "error" : "";
  }

  function escapeHtml(value) {
    return String(value ?? "").replace(/[&<>"']/g, (c) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[c]));
  }

  async function loadEvents() {
    try {
      setStatus("loading events");

      const q = qEl.value.trim();
      const type = typeEl.value;
      const source = sourceEl.value;

      let url = `${API_BASE}/events?`;
      if (q) url += `q=${encodeURIComponent(q)}&`;
      if (type) url += `type=${encodeURIComponent(type)}&`;
      if (source) url += `source=${encodeURIComponent(source)}&`;

      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();

      eventsLayer.clearLayers();
      eventsEl.innerHTML = "";

      const events = Array.isArray(data.events) ? data.events : [];

      if (events.length === 0) {
        eventsEl.innerHTML = `<div class="event"><strong>No events found</strong><div class="muted">Try changing filters or refreshing later.</div></div>`;
        setStatus("0 events");
        return;
      }

      const bounds = [];

      events.forEach((ev) => {
        const lat = ev.lat;
        const lon = ev.lon;
        let marker = null;

        if (lat != null && lon != null) {
          marker = L.marker([lat, lon]).addTo(eventsLayer);
          marker.bindPopup(`
            <strong>${escapeHtml(ev.title || "event")}</strong><br>
            ${escapeHtml(ev.source || "")}
          `);
          bounds.push([lat, lon]);
        }

        const div = document.createElement("div");
        div.className = "event" + (marker ? " clickable" : "");
        div.innerHTML = `
          <strong>${escapeHtml(ev.title || "event")}</strong>
          <div class="muted">${escapeHtml(ev.source || "")}</div>
          <div class="muted">${escapeHtml(ev.time || "")}</div>
        `;

        if (marker && lat != null && lon != null) {
          div.addEventListener("click", () => {
            map.setView([lat, lon], 8);
            marker.openPopup();
          });
        }

        eventsEl.appendChild(div);
      });

      if (bounds.length > 0) {
        map.fitBounds(bounds, { padding: [30, 30] });
      }

      setStatus(`${events.length} events loaded`);
    } catch (err) {
      console.error(err);
      eventsLayer.clearLayers();
      eventsEl.innerHTML = `<div class="event"><strong>Unable to load events</strong><div class="muted">Please try again later.</div></div>`;
      setStatus("error loading events", true);
    }
  }

  async function loadAircraft() {
    try {
      aircraftLayer.clearLayers();
      setStatus("loading aircraft");

      const res = await fetch(`${API_BASE}/aircraft`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      const features = Array.isArray(data.features) ? data.features : [];

      features.forEach((f) => {
        const coords = f?.geometry?.coordinates;
        if (!Array.isArray(coords) || coords.length < 2) return;

        const lon = coords[0];
        const lat = coords[1];
        if (lat == null || lon == null) return;

        const p = f.properties || {};

        const marker = L.circleMarker([lat, lon], {
          radius: 4,
          color: "#38bdf8"
        }).addTo(aircraftLayer);

        marker.bindPopup(`
          <strong>${escapeHtml(p.callsign || "aircraft")}</strong><br>
          alt: ${escapeHtml(p.baro_altitude || "?")}
        `);
      });

      setStatus(`${features.length} aircraft loaded`);
    } catch (err) {
      console.error(err);
      aircraftLayer.clearLayers();
      setStatus("error loading aircraft", true);
    }
  }

  refreshBtn.addEventListener("click", loadEvents);

  qEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter") loadEvents();
  });

  aircraftToggle.addEventListener("change", (e) => {
    if (e.target.checked) {
      loadAircraft();
    } else {
      aircraftLayer.clearLayers();
      setStatus("aircraft hidden");
    }
  });

  loadEvents();
</script>

</body>
</html>
